{% extends "base.html" %}

{% block content %}

<h1>Listado de publicaciones</h1>

{% for pub in publicacion_list %}

<div>
    <h2>{{ pub.titulo }}</h2>

    <p><strong>Autor:</strong> {{ pub.autor }}</p>

    <p><strong>Fecha:</strong> {{ pub.fecha_publicacion }}</p>

    <a href="{% url 'publicaciones:detalle_publicacion' pub.pk %}">
        Ver detalle
    </a>
</div>

<hr>

{% empty %}

<p>No hay publicaciones disponibles aún.</p>

{% endfor %}

{% endblock %}
